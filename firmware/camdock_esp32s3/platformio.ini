[platformio]
src_dir = src

[env:esp32s3_camdock]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
upload_speed = 460800
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -I../shared
lib_deps =
  adafruit/Adafruit PWM Servo Driver Library
  pololu/VL53L1X
